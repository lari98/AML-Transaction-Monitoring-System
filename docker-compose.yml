version: "3.9"
# AML Monitoring System — Docker Compose
# Full local development stack: API + Kafka + PostgreSQL + Redis + Monitoring

name: aml-monitoring

x-common-env: &common-env
  TZ: Europe/Zurich
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
    image: aml-monitoring/backend:${APP_VERSION:-1.0.0}
    container_name: aml-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-32-chars-minimum-here}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-dev-pii-key-32-chars-minimum-here}
      DATABASE_URL: postgresql+asyncpg://aml_user:${POSTGRES_PASSWORD:-aml_pass}@postgres:5432/aml_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MASK_PII_IN_LOGS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:ro
      - ./locales:/app/locales:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aml-internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ── Transaction Simulator ────────────────────────────────────────────────
  simulator:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: aml-simulator
    restart: unless-stopped
    command: python simulator.py --tps 5 --aml-rate 0.03 --kafka-broker kafka:9092
    environment:
      <<: *common-env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aml-internal

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: aml-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aml_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aml_pass}
      POSTGRES_DB: aml_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml_user -d aml_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aml-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-internal

  # ── Kafka (KRaft mode — no ZooKeeper) ────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: aml-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "6"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"   # 7 days
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aml-internal

  # ── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: aml-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install mlflow==2.13.0 psycopg2-binary --quiet &&
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri postgresql://aml_user:${POSTGRES_PASSWORD:-aml_pass}@postgres:5432/mlflow_db
             --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aml-internal

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aml-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aml-internal
      - aml-monitoring

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: aml-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - aml-monitoring

  # ── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aml-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alerts/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - aml-internal
      - aml-monitoring

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:

networks:
  aml-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  aml-monitoring:
    driver: bridge
