# AML Monitoring System — Prometheus Configuration
# Scrapes: FastAPI backend, Kafka, PostgreSQL, Redis, Node exporter

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    service: aml-monitoring
    region: eu-west

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── AML FastAPI Backend ────────────────────────────────────────────────
  - job_name: aml_backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "aml-backend"

  # ── PostgreSQL ────────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "aml-postgres"

  # ── Redis ─────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ── Kafka ─────────────────────────────────────────────────────────────
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
    scrape_interval: 30s

  # ── Node Exporter (host metrics) ──────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Prometheus self-monitoring ─────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
